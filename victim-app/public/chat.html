<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victim App - Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: #e2e8f0;
    }

    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title-box h1 {
      margin: 0;
      font-size: 30px;
      color: #f8fafc;
    }

    .title-box p {
      margin: 8px 0 0;
      color: #94a3b8;
    }

    .logout-form button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ef4444;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .sidebar {
      padding: 22px;
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: 15px;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-box {
      padding: 16px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.12);
      margin-bottom: 16px;
    }

    .status-label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
    }

    .hint {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #94a3b8;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      min-height: 70vh;
    }

    .chat-header {
      padding: 20px 22px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      background: rgba(15, 23, 42, 0.8);
    }

    .chat-header h2 {
      margin: 0;
      font-size: 20px;
      color: #f8fafc;
    }

    .chat-header p {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    #messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: rgba(2, 6, 23, 0.35);
    }

    .msg {
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      max-width: 85%;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .system {
      background: rgba(51, 65, 85, 0.7);
      color: #cbd5e1;
      font-style: italic;
    }

    .chat {
      background: rgba(30, 41, 59, 0.95);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .chat strong {
      color: #60a5fa;
    }

    .composer {
      padding: 18px 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
      background: rgba(15, 23, 42, 0.92);
    }

    #chatForm {
      display: flex;
      gap: 12px;
    }

    #messageInput {
      flex: 1;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f8fafc;
      font-size: 15px;
      outline: none;
    }

    #messageInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
    }

    #chatForm button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      min-width: 110px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        min-height: 60vh;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .logout-form button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="topbar">
      <div class="title-box">
        <h1>Victim Chat</h1>
        <p>Authenticated WebSocket demo application</p>
      </div>

      <form class="logout-form" method="POST" action="/logout">
        <button type="submit">Logout</button>
      </form>
    </div>

    <div class="grid">
      <div class="card sidebar">
        <h3 class="panel-title">Session</h3>

        <div class="status-box">
          <div class="status-label">User</div>
          <div class="status-value" id="status">Checking session...</div>
        </div>

        <div class="status-box">
          <div class="status-label">Connection</div>
          <div class="status-value" id="socketStatus">Connecting...</div>
        </div>

        <div class="hint">
          This page represents the legitimate application used in the CSWSH lab.
        </div>
      </div>

      <div class="card chat-panel">
        <div class="chat-header">
          <h2>Real-Time Chat</h2>
          <p>Messages are sent through a WebSocket connection.</p>
        </div>

        <div id="messages"></div>

        <div class="composer">
          <form id="chatForm">
            <input
              id="messageInput"
              type="text"
              placeholder="Type a message"
              autocomplete="off"
            />
            <button type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const socketStatusEl = document.getElementById('socketStatus');
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');

    let socket;

    function addMessage(text, className = 'msg') {
      const div = document.createElement('div');
      div.className = className;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addChatMessage(user, text) {
      const div = document.createElement('div');
      div.className = 'msg chat';
      div.innerHTML = `<strong>${user}:</strong> ${text}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    fetch('/me')
      .then(res => res.json())
      .then(data => {
        if (!data.loggedIn) {
          statusEl.textContent = 'Not logged in';
          socketStatusEl.textContent = 'Disconnected';
          return;
        }

        statusEl.textContent = data.user;

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${location.host}/ws`);

        socket.addEventListener('open', () => {
          socketStatusEl.textContent = 'Connected';
          addMessage('WebSocket connected', 'msg system');
        });

        socket.addEventListener('message', (event) => {
          const data = JSON.parse(event.data);

          if (data.type === 'system') {
            addMessage(data.text, 'msg system');
          } else if (data.type === 'chat') {
            addChatMessage(data.user, data.text);
          } else if (data.type === 'error') {
            addMessage(`Error: ${data.text}`, 'msg system');
          }
        });

        socket.addEventListener('close', () => {
          socketStatusEl.textContent = 'Disconnected';
          addMessage('WebSocket disconnected', 'msg system');
        });
      })
      .catch(() => {
        statusEl.textContent = 'Failed to load session';
        socketStatusEl.textContent = 'Error';
      });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const text = messageInput.value.trim();

      if (!text || !socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      socket.send(JSON.stringify({
        type: 'chat',
        text
      }));

      messageInput.value = '';
      messageInput.focus();
    });
  </script>
</body>
</html>
